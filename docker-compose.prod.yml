services:
  pricewatch-api:
    image: gustavodamassa/pricewatch-api:latest
    container_name: pricewatch-api
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      MongoDb__ConnectionString: ${MONGO_CONNECTION_STRING}
      MongoDb__DatabaseName: ${MONGO_DATABASE}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-24}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__From: ${SMTP_FROM}
      Smtp__User: ${SMTP_USER}
      Smtp__Password: ${SMTP_PASSWORD}
    depends_on:
      - pricewatch-mongo
      - pricewatch-redis
    restart: unless-stopped

  pricewatch-mongo:
    image: mongo:7
    container_name: pricewatch-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  pricewatch-redis:
    image: redis:7-alpine
    container_name: pricewatch-redis
    restart: unless-stopped

  pricewatch-watchtower:
    image: containrrr/watchtower
    container_name: pricewatch-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: pricewatch-api --interval 30
    restart: unless-stopped

volumes:
  mongo_data:
